kind = "api"
previewPath = "/"
title = "Programmatic Optimization App"
version = "1.0.0"
id = "3B4_FFSkEVBkAeYMFRJ2e"

[[services]]
localPort = 8080
name = "Streamlit App"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/api-server run dev"

[services.production]

[services.production.build]
args = ["pip", "install", "--no-cache-dir", "-r", "requirements.txt"]

[services.production.run]
args = ["streamlit", "run", "app.py", "--server.port", "8080", "--server.address", "0.0.0.0", "--server.headless", "true"]

[services.production.run.env]
PORT = "8080"

[services.production.health.startup]
path = "/"
